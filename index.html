<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FilmsBot Pro UI</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { 
            margin: 0; padding: 0; background-color: #fff; 
            font-family: -apple-system, system-ui, sans-serif;
            height: 100vh; overflow: hidden;
        }

        /* ШАПКА СО СТЕКЛОМ */
        .header {
            position: sticky; top: 0; z-index: 100;
            background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            padding: 10px 15px; border-bottom: 0.5px solid rgba(0,0,0,0.1);
        }
        .search-bar {
            background: rgba(0, 0, 0, 0.05); border-radius: 12px;
            padding: 8px 12px; display: flex; align-items: center; gap: 10px;
        }
        .search-bar svg { width: 18px; height: 18px; fill: #8e8e93; }
        .search-bar span { color: #8e8e93; font-size: 17px; }

        /* КОНТЕНТ */
        .scroll-area { height: calc(100vh - 60px); overflow-y: auto; padding: 15px; padding-bottom: 150px; }
        .movie-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }

        /* КАРТОЧКА И БОЛЬШИЕ ПОСТЕРЫ */
        .movie-card { background: #fff; border-radius: 20px; overflow: hidden; position: relative; }
        .movie-card img { 
            width: 100%; height: 280px; 
            object-fit: cover; background: #f0f0f0; border-radius: 20px;
        }
        .movie-title { 
            padding: 10px 5px; text-align: center; 
            font-weight: 700; font-size: 15px; color: #000; 
        }

        /* КНОПКИ БЕЗ ФОНА */
        .btn-overlay {
            position: absolute; top: 12px; width: 32px; height: 32px;
            background: none; display: flex; align-items: center; justify-content: center; border: none;
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
        }
        .btn-dislike { left: 12px; opacity: 0; transition: 0.3s, transform 0.2s; } /* Скрыт до нажатия Далее */
        .btn-heart { right: 12px; }
        .btn-overlay svg { width: 24px; height: 24px; fill: #b0b0b0; pointer-events: none; }

        /* ЦВЕТА ПРИ НАЖАТИИ */
        .is-liked svg { fill: #ff3b30 !important; } 
        
        /* ДИЗЛАЙК: ЗАКРАШИВАНИЕ */
        .is-disliked svg { 
            fill: #333 !important; 
            stroke: #333 !important;
        }

        /* АНИМАЦИЯ УВЕЛИЧЕНИЯ */
        .pulse { transform: scale(1.4); }

        /* СТЕКЛЯННАЯ КНОПКА ДАЛЕЕ */
        .next-btn {
            position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%);
            padding: 14px 60px; border-radius: 30px; border: 1px solid rgba(255,255,255,0.2);
            background: rgba(0, 0, 0, 0.6); color: #fff; font-weight: 700;
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); z-index: 1000;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        /* НИЖНЯЯ ПАНЕЛЬ */
        .bottom-nav {
            position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%);
            width: 85%; max-width: 320px; height: 65px;
            background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-radius: 35px; display: none; align-items: center; justify-content: space-around;
            border: 1px solid rgba(0,0,0,0.05); box-shadow: 0 8px 25px rgba(0,0,0,0.08);
        }
        .nav-link { opacity: 0.3; transition: 0.2s; display: flex; align-items: center; justify-content: center; }
        .nav-link.active { opacity: 1; transform: scale(1.1); }
        .nav-link svg { width: 28px; height: 28px; fill: #000; }

        /* ПРОФИЛЬ */
        .page { display: none; width: 100%; }
        .active-page { display: grid; }
        .profile-wrap { display: none; flex-direction: column; align-items: center; padding-top: 50px; }
        .avatar { width: 110px; height: 110px; border-radius: 50%; background: #eee; margin-bottom: 20px; border: 3px solid #fff; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .u-name { font-size: 26px; font-weight: 800; text-transform: uppercase; margin-bottom: 30px; }
        .stat-row { display: flex; align-items: center; gap: 15px; }
        .stat-row svg { width: 30px; height: 30px; fill: #ff3b30; }
        .stat-num { font-size: 32px; font-weight: 800; color: #000; }

        .empty-msg { grid-column: 1/3; text-align: center; margin-top: 100px; font-size: 20px; font-weight: 800; color: #000; }
    </style>
</head>
<body>

    <svg style="display:none;">
        <symbol id="icon-search" viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></symbol>
        <symbol id="icon-heart" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></symbol>
        <symbol id="icon-dislike" viewBox="0 0 24 24"><path d="M18 6L6 18M6 6l12 12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></symbol>
        <symbol id="icon-home" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></symbol>
        <symbol id="icon-profile" viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></symbol>
    </svg>

    <div class="header">
        <div class="search-bar">
            <svg><use xlink:href="#icon-search"></use></svg>
            <span>поиск</span>
        </div>
    </div>

    <div class="scroll-area">
        <div id="home" class="movie-grid page active-page"></div>
        <div id="favs" class="movie-grid page">
            <div class="empty-msg">УПС, ВАШ СПИСОК ПУСТ!</div>
        </div>
        <div id="profile" class="profile-wrap">
            <img id="u-pic" class="avatar" src="https://www.w3schools.com/howto/img_avatar.png">
            <div id="u-name" class="u-name">ПОЛЬЗОВАТЕЛЬ</div>
            <div class="stat-row">
                <svg><use xlink:href="#icon-heart"></use></svg>
                <span id="l-count" class="stat-num">0</span>
            </div>
        </div>
    </div>

    <button id="next-btn" class="next-btn" onclick="unlockApp()">Далее</button>

    <div id="navbar" class="bottom-nav">
        <div class="nav-link active" onclick="tab('home', this)"><svg><use xlink:href="#icon-home"></use></svg></div>
        <div class="nav-link" onclick="tab('favs', this)"><svg><use xlink:href="#icon-heart"></use></svg></div>
        <div class="nav-link" onclick="tab('profile', this)"><svg><use xlink:href="#icon-profile"></use></svg></div>
    </div>

<script>
    const tg = window.Telegram.WebApp;
    const API = "https://unrebuked-overinsistently-chasidy.ngrok-free.dev"; 
    
    let allMovies = [];
    let likes = new Set();
    let dislikes = new Set();
    let isUnlocked = false;

    async function init() {
        if (tg.initDataUnsafe?.user) {
            document.getElementById('u-name').innerText = tg.initDataUnsafe.user.first_name.toUpperCase();
            if (tg.initDataUnsafe.user.photo_url) document.getElementById('u-pic').src = tg.initDataUnsafe.user.photo_url;
        }

        try {
            // Загружаем начальный список
            const r = await fetch(`${API}/movies`, { headers: {'ngrok-skip-browser-warning': 'true'} });
            allMovies = await r.json();
            renderMovies(allMovies);
        } catch(e) { console.error("Ошибка API"); }
    }

    function renderMovies(list) {
        const box = document.getElementById('home');
        box.innerHTML = '';
        list.forEach(m => {
            const card = document.createElement('div');
            card.className = 'movie-card';
            card.innerHTML = `
                <img src="${m.poster_url}" onerror="this.src='https://via.placeholder.com/280x400?text=No+Poster'">
                <div class="movie-title">${m.title}</div>
                <button class="btn-overlay btn-dislike" style="opacity: ${isUnlocked ? 1 : 0}" onclick="doDislike(this, ${m.id})">
                    <svg><use xlink:href="#icon-dislike"></use></svg>
                </button>
                <button class="btn-overlay btn-heart ${likes.has(m.id)?'is-liked':''}" onclick="doLike(this, ${m.id})">
                    <svg><use xlink:href="#icon-heart"></use></svg>
                </button>
            `;
            box.appendChild(card);
        });
    }

    function animateButton(btn) {
        btn.classList.add('pulse');
        setTimeout(() => btn.classList.remove('pulse'), 200);
    }

    async function doLike(btn, id) {
        animateButton(btn);
        const card = btn.parentElement;
        const dislikeBtn = card.querySelector('.btn-dislike');
        
        if (likes.has(id)) {
            likes.delete(id);
            btn.classList.remove('is-liked');
        } else {
            likes.add(id);
            dislikes.delete(id);
            btn.classList.add('is-liked');
            dislikeBtn.classList.remove('is-disliked'); 
        }
        
        updateCounter();
        await sendRate(id, 'like');
        
        // Если уже разблокировано (режим ИИ), обновляем список при каждом действии
        if (isUnlocked) loadRecommendations();
    }

    async function doDislike(btn, id) {
        if (!isUnlocked) return; // Дизлайки не работают до нажатия "Далее"
        
        animateButton(btn);
        const card = btn.parentElement;
        const likeBtn = card.querySelector('.btn-heart');

        if (btn.classList.contains('is-disliked')) {
            btn.classList.remove('is-disliked');
            dislikes.delete(id);
        } else {
            btn.classList.add('is-disliked');
            dislikes.add(id);
            likes.delete(id); 
            likeBtn.classList.remove('is-liked');
        }
        
        updateCounter();
        await sendRate(id, 'dislike');
        if (isUnlocked) loadRecommendations();
    }

    async function sendRate(id, action) {
        try {
            fetch(`${API}/rate`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ movie_id: id, action: action })
            });
        } catch(e) { console.error(e); }
    }

    async function loadRecommendations() {
        try {
            const r = await fetch(`${API}/recommend`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ liked_movies: Array.from(likes), disliked_movies: Array.from(dislikes) })
            });
            allMovies = await r.json();
            renderMovies(allMovies);
        } catch(e) { console.error(e); }
    }

    function updateCounter() {
        document.getElementById('l-count').innerText = likes.size;
        tg.HapticFeedback.impactOccurred('light');
    }

    async function unlockApp() {
        isUnlocked = true;
        document.getElementById('next-btn').style.display = 'none';
        document.getElementById('navbar').style.display = 'flex';
        
        // Показываем кнопки дизлайка
        document.querySelectorAll('.btn-dislike').forEach(b => b.style.opacity = "1");
        
        // Загружаем рекомендации на основе первого выбора
        tg.HapticFeedback.notificationOccurred('success');
        loadRecommendations();
    }

    function tab(id, el) {
        document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('active'));
        el.classList.add('active');
        
        document.getElementById('home').style.display = 'none';
        document.getElementById('favs').style.display = 'none';
        document.getElementById('profile').style.display = 'none';

        if (id === 'profile') {
            document.getElementById('profile').style.display = 'flex';
        } else if (id === 'favs') {
            document.getElementById('favs').style.display = 'grid';
            renderFavs();
        } else {
            document.getElementById(id).style.display = 'grid';
        }
    }

    function renderFavs() {
        const fBox = document.getElementById('favs');
        fBox.innerHTML = '';
        const filtered = allMovies.filter(m => likes.has(m.id));
        if (filtered.length === 0) {
            fBox.innerHTML = '<div class="empty-msg">УПС, ВАШ СПИСОК ПУСТ!</div>';
        } else {
            filtered.forEach(m => {
                const card = document.createElement('div');
                card.className = 'movie-card';
                card.innerHTML = `<img src="${m.poster_url}"><div class="movie-title">${m.title}</div>`;
                fBox.appendChild(card);
            });
        }
    }

    init();
    tg.expand();
</script>
</body>
</html>
