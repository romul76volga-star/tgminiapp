<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FilmsBot AI</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --tg-bg: #fff; --accent: #ff3b30; }
        body { margin: 0; background: var(--tg-bg); font-family: -apple-system, sans-serif; height: 100vh; overflow: hidden; }
        .header { padding: 12px; background: rgba(255,255,255,0.8); backdrop-filter: blur(10px); border-bottom: 0.5px solid #ddd; }
        .search-bar { background: #f0f0f0; border-radius: 10px; padding: 8px; display: flex; }
        .search-bar input { border: none; background: transparent; width: 100%; font-size: 16px; outline: none; }
        .scroll-area { height: calc(100vh - 65px); overflow-y: auto; padding: 15px; padding-bottom: 150px; }
        .movie-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .movie-card { background: #fff; border-radius: 15px; overflow: hidden; position: relative; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .movie-card img { width: 100%; height: 250px; object-fit: cover; background: #eee; }
        .movie-title { padding: 8px; text-align: center; font-size: 14px; font-weight: 600; }
        .btn-overlay { position: absolute; top: 10px; width: 34px; height: 34px; background: #fff; border-radius: 50%; border: none; z-index: 5; display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .btn-dislike { left: 10px; opacity: 0; pointer-events: none; }
        .btn-heart { right: 10px; color: #ccc; font-size: 20px; }
        .is-liked { color: var(--accent) !important; }
        .next-btn { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); padding: 15px 45px; border-radius: 30px; border: none; background: #000; color: #fff; font-weight: 700; z-index: 100; }
        .bottom-nav { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 70%; height: 60px; background: #fff; border-radius: 30px; display: none; align-items: center; justify-content: space-around; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .status-err { text-align: center; margin-top: 100px; color: red; padding: 20px; }
    </style>
</head>
<body>
    <div class="header"><div class="search-bar"><input type="text" placeholder="Поиск фильма..."></div></div>
    <div class="scroll-area"><div id="home" class="movie-grid"><div style="text-align:center;width:200%;margin-top:50px;">Загрузка...</div></div></div>
    <button id="next-btn" class="next-btn" onclick="unlockApp()">Далее</button>
    <div id="navbar" class="bottom-nav"><div onclick="location.reload()">🏠</div><div>❤️</div></div>

<script>
    const tg = window.Telegram.WebApp;
    // !!! ЗАМЕНИ ЭТУ ССЫЛКУ НА СВОЮ ИЗ NGROK !!!
    const API = "https://unrebuked-overinsistently-chasidy.ngrok-free.dev"; 

    let allMovies = [];
    let likes = new Set();
    let isUnlocked = false;

    async function init() {
        tg.ready();
        tg.expand();
        try {
            const r = await fetch(`${API}/movies`, { headers: {'ngrok-skip-browser-warning': 'true'} });
            if (!r.ok) throw new Error("Сервер не отвечает");
            allMovies = await r.json();
            render(allMovies);
        } catch(e) {
            document.getElementById('home').innerHTML = `<div class="status-err">ОШИБКА ПОДКЛЮЧЕНИЯ!<br><small>Проверь main.py и ссылку API</small></div>`;
        }
    }

    function render(list) {
        const box = document.getElementById('home');
        box.innerHTML = '';
        list.forEach(m => {
            const card = document.createElement('div');
            card.className = 'movie-card';
            card.innerHTML = `
                <img src="${m.poster_url}" referrerpolicy="no-referrer" onerror="this.src='https://via.placeholder.com/250x350?text=Error'">
                <div class="movie-title">${m.title}</div>
                <button class="btn-overlay btn-dislike" style="opacity:${isUnlocked?1:0};" onclick="rate(${m.id},'dislike')">❌</button>
                <button class="btn-overlay btn-heart ${likes.has(m.id)?'is-liked':''}" onclick="rate(${m.id},'like',this)">❤️</button>
            `;
            box.appendChild(card);
        });
    }

    async function rate(id, action, btn) {
        if(action === 'like') { likes.add(id); if(btn) btn.classList.add('is-liked'); }
        fetch(`${API}/rate`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({movie_id: id, action: action}) });
        tg.HapticFeedback.impactOccurred('light');
    }

    function unlockApp() {
        isUnlocked = true;
        document.getElementById('next-btn').style.display = 'none';
        document.getElementById('navbar').style.display = 'flex';
        render(allMovies);
    }

    init();
</script>
</body>
</html>
