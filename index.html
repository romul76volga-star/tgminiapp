<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My First TMA</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <style>
        /* Используем системные цвета Telegram, чтобы приложение выглядело нативно */
        body {
            --bg-color: var(--tg-theme-bg-color, #ffffff);
            --text-color: var(--tg-theme-text-color, #222222);
            --hint-color: var(--tg-theme-hint-color, #999999);
            
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            text-align: center;
        }
        .container {
            margin-top: 50px;
        }
        button {
            padding: 10px 20px;
            background-color: var(--tg-theme-button-color, #2481cc);
            color: var(--tg-theme-button-text-color, #ffffff);
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Привет, <span id="user-name">пользователь</span>!</h1>
        <p style="color: var(--hint-color)">Это твое первое Mini App приложение.</p>
        <button id="main-btn">Закрыть приложение</button>
    </div>

    <script>
        // 2. Инициализация объекта WebApp
        const tg = window.Telegram.WebApp;

        // Сообщаем Telegram, что приложение готово
        tg.ready();
        // Расширяем на максимально возможную высоту
        tg.expand();

        // 3. Получаем имя пользователя из данных Telegram
        const userName = document.getElementById('user-name');
        if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
            userName.innerText = tg.initDataUnsafe.user.first_name;
        }

        // 4. Логика кнопки
        document.getElementById('main-btn').addEventListener('click', () => {
            tg.close(); // Закрыть Mini App
        });
    </script>
</body>
</html>
