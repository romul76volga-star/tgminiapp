<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FilmsBot</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            margin: 0; padding: 0;
            background-color: #1a1a1a;
            font-family: -apple-system, sans-serif;
            height: 100vh; overflow: hidden;
        }

        /* Белый лист на весь экран */
        .app-shell {
            background: white;
            width: 100%; height: 100%;
            display: flex; flex-direction: column;
            position: relative;
        }

        /* Поиск с эффектом стекла */
        .header {
            padding: 15px;
            position: sticky; top: 0; z-index: 10;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px); /* Эффект стекла */
        }
        .search-box {
            background: #f0f0f0; border-radius: 12px;
            padding: 10px; color: #888;
            display: flex; align-items: center; font-size: 15px;
        }

        /* Контентная область */
        .main-content {
            flex: 1; overflow-y: auto;
            padding: 10px 15px 100px 15px;
        }

        .movie-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 15px;
        }

        /* Карточка в сером стиле */
        .movie-card {
            background: #f9f9f9; border-radius: 20px;
            position: relative; overflow: hidden;
            display: flex; flex-direction: column;
        }
        .movie-card img {
            width: 100%; height: 180px; object-fit: cover;
            filter: grayscale(20%); /* Легкий серый оттенок картинок */
        }
        .movie-info { padding: 10px; text-align: center; color: #444; font-size: 14px; }

        /* Серые иконки */
        .icon-btn {
            position: absolute; top: 10px;
            width: 28px; height: 28px;
            background: rgba(255,255,255,0.9);
            border-radius: 50%; display: flex;
            align-items: center; justify-content: center;
            color: #888; font-size: 18px; cursor: pointer;
        }
        .btn-heart { right: 10px; }
        .btn-fav { right: 45px; display: none; } /* Скрыто до нажатия "Я готов" */
        
        .active-gray { color: #333 !important; font-weight: bold; }

        /* Нижняя панель навигации со стеклом */
        .nav-bar {
            position: absolute; bottom: 0; width: 100%;
            height: 70px; display: none;
            justify-content: space-around; align-items: center;
            background: rgba(248, 248, 248, 0.8);
            backdrop-filter: blur(15px);
            border-top: 1px solid #eee;
        }
        .nav-item { font-size: 24px; color: #aaa; cursor: pointer; }
        .nav-active { color: #333; }

        /* Кнопка */
        .ready-btn {
            position: fixed; bottom: 30px; left: 50%;
            transform: translateX(-50%);
            padding: 14px 50px; background: #333;
            color: white; border: none; border-radius: 25px;
            font-weight: bold; z-index: 100;
        }

        /* Скрытые экраны */
        .page { display: none; }
        .page-active { display: grid; }
    </style>
</head>
<body>

<div class="app-shell">
    <div class="header">
        <div class="search-box">🔍 поиск</div>
    </div>

    <div class="main-content">
        <div id="page-home" class="movie-grid page page-active"></div>
        
        <div id="page-fav" class="movie-grid page">
            <div style="grid-column: 1/3; text-align: center; color: #999; margin-top: 50px;">Тут будут ваши закладки</div>
        </div>

        <div id="page-profile" class="page" style="text-align: center; padding-top: 50px; color: #444;">
            <h3>Ваш профиль</h3>
            <p>Настройки и статистика</p>
        </div>
    </div>

    <button id="ready-btn" class="ready-btn" onclick="activateFullMode()">Я готов!</button>

    <div id="nav-bar" class="nav-bar">
        <div class="nav-item nav-active" onclick="switchTab('home', this)">🏠</div>
        <div class="nav-item" onclick="switchTab('fav', this)">🔖</div>
        <div class="nav-item" onclick="switchTab('profile', this)">👤</div>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    // ЗАМЕНИ НА СВОЙ NGROK
    const API_URL = "https://unrebuked-overinsistently-chasidy.ngrok-free.dev"; 

    async function load() {
        try {
            const resp = await fetch(`${API_URL}/movies`, { headers: {'ngrok-skip-browser-warning': 'true'} });
            const movies = await resp.json();
            const grid = document.getElementById('page-home');
            
            movies.forEach(m => {
                const card = document.createElement('div');
                card.className = 'movie-card';
                card.innerHTML = `
                    <img src="${m.poster_url}">
                    <div class="movie-info">фильм</div>
                    <div class="icon-btn btn-heart" onclick="this.classList.toggle('active-gray')">❤</div>
                    <div class="icon-btn btn-fav" onclick="this.classList.toggle('active-gray')">🔖</div>
                `;
                grid.appendChild(card);
            });
        } catch(e) {}
    }

    function activateFullMode() {
        document.getElementById('ready-btn').style.display = 'none';
        document.getElementById('nav-bar').style.display = 'flex';
        document.querySelectorAll('.btn-fav').forEach(i => i.style.display = 'flex');
    }

    function switchTab(tabId, el) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('page-active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('nav-active'));
        
        document.getElementById('page-' + tabId).classList.add('page-active');
        el.classList.add('nav-active');
    }

    load();
</script>
</body>
</html>
