<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FilmsBot iOS Style</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            margin: 0; padding: 0;
            background-color: #1a1a1a;
            font-family: -apple-system, SF Pro Display, sans-serif;
            height: 100vh; overflow: hidden;
            -webkit-user-select: none; user-select: none;
        }

        /* Белое полотно приложения */
        .app-shell {
            background: white;
            width: 100%; height: 100%;
            display: flex; flex-direction: column;
            position: relative;
            transition: opacity 0.3s ease;
        }

        /* Шапка */
        .header {
            padding: 10px 15px;
            position: sticky; top: 0; z-index: 10;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }
        .search-box {
            background: #f2f2f2; border-radius: 10px;
            padding: 8px 12px; color: #8e8e93;
            display: flex; align-items: center; font-size: 16px;
        }

        /* Контент */
        .main-content {
            flex: 1; overflow-y: auto;
            padding: 15px 15px 120px 15px;
            -webkit-overflow-scrolling: touch;
        }

        .movie-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 15px;
        }

        /* Карточка: РАЗМЕР ПОСТЕРА НЕ МЕНЯЕМ */
        .movie-card {
            background: #fff; border-radius: 18px;
            position: relative; overflow: hidden;
            display: flex; flex-direction: column;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }
        .movie-card img { width: 100%; height: 210px; object-fit: cover; background: #eee; }
        
        /* !!! НАЗВАНИЕ ФИЛЬМА ЖИРНЫМ И СНИЗУ !!! */
        .movie-info { 
            padding: 12px; text-align: center; color: #000; 
            font-size: 15px; font-weight: 700; /* Жирный шрифт */
            border-top: 1px solid #eee;
        }

        /* Крупные серые иконки */
        .card-icon-btn {
            position: absolute; top: 12px;
            width: 38px; height: 38px;
            background: rgba(255,255,255,0.8);
            backdrop-filter: blur(5px);
            border-radius: 50%; display: flex;
            align-items: center; justify-content: center;
            cursor: pointer; transition: 0.2s;
            border: 1px solid rgba(0,0,0,0.05);
        }
        .card-icon-btn svg { width: 22px; height: 22px; fill: #b0b0b0; transition: 0.2s; }
        .btn-fav { left: 12px; display: none; } /* Закладка слева */
        .btn-heart { right: 12px; } /* Сердце справа */
        .icon-active svg { fill: #333333 !important; }

        /* --- НИЖНЯЯ ПАНЕЛЬ С ПУЗЫРЬКОМ (iOS стиль) --- */
        .nav-wrapper {
            position: absolute; bottom: 20px; left: 50%;
            transform: translateX(-50%);
            width: 290px; height: 65px;
            background: rgba(240, 240, 240, 0.7);
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border-radius: 35px;
            display: none; /* Скрыто изначально */
            justify-content: space-around; align-items: center;
            border: 1px solid rgba(0,0,0,0.05);
            z-index: 10;
        }

        /* !!! ТОТ САМЫЙ КРУПНЫЙ ПРОЗРАЧНЫЙ ПУЗЫРЁК !!! */
        .nav-bubble {
            position: absolute;
            width: 90px; height: 50px; /* Крупнее */
            background: rgba(255, 255, 255, 0.5); /* Более прозрачный */
            backdrop-filter: blur(10px); /* Матовое стекло внутри */
            border-radius: 25px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.08);
            transition: transform 0.3s ease;
            z-index: 1;
            left: 5px; /* Изначальная позиция */
        }
        
        .nav-item {
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; width: 90px; height: 100%;
            cursor: pointer; z-index: 2; /* Поверх пузырька */
        }
        .nav-item svg { width: 28px; height: 28px; fill: #b0b0b0; transition: 0.2s; }
        .nav-active svg { fill: #333333 !important; }

        /* !!! УНИВЕРСАЛЬНАЯ КНОПКА "ДАЛЕЕ" (УГОЛ + СТЕКЛО) !!! */
        .ready-btn {
            position: fixed;
            bottom: 3vh; /* Адаптивный отступ */
            right: 4vw; /* Адаптивный отступ */
            padding: 14px 30px;
            /* РАЗМЕР КНОПКИ: vw/vh для адаптации */
            width: auto; max-width: 150px; 
            background: rgba(255, 255, 255, 0.3); /* Очень прозрачный */
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            color: #333;
            border: 1px solid rgba(0,0,0,0.08);
            border-radius: 20px;
            font-weight: 700; font-size: 16px;
            z-index: 100;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: 0.2s;
        }
        .ready-btn:active { transform: scale(0.96); opacity: 0.8; }

        /* --- ЭКРАН ПРОФИЛЯ (iOS Стиль) --- */
        .profile-page {
            display: none; flex-direction: column; align-items: center;
            padding: 30px 20px; text-align: center; color: #000;
        }
        
        /* Заголовок "профиль" */
        .profile-header {
            align-self: flex-start; font-size: 28px; font-weight: 800;
            margin-bottom: 30px; margin-left: 10px;
        }

        /* Блок юзера */
        .user-block {
            display: flex; align-items: center; width: 100%;
            background: #f9f9f9; border-radius: 20px; padding: 15px;
            border: 1px solid #eee; margin-bottom: 25px;
        }
        .user-avatar {
            width: 70px; height: 70px; border-radius: 50%;
            background: #e0e0e0; margin-right: 20px;
            object-fit: cover; /* Для реальной аватарки */
        }
        .user-name { font-size: 22px; font-weight: 700; color: #000; }

        /* !!! БЛОК КОЛИЧЕСТВА ЛАЙКОВ (Цифра + Сердце) !!! */
        .stats-block {
            display: flex; align-items: center; align-self: flex-start;
            margin-left: 15px; margin-top: 10px;
        }
        .stats-icon svg { width: 35px; height: 35px; fill: #e0e0e0; margin-right: 15px; }
        .stats-count { font-size: 48px; font-weight: 400; color: #000; } /* Цифра как на макете */

        /* Экраны */
        .page { display: none; width: 100%; height: 100%; }
        .page-active { display: grid; }
        .profile-active { display: flex; } /* Специфично для профиля */
        
        /* Заглушка для вкладок */
        .placeholder-page {
            grid-column: 1/3; text-align: center;
            padding-top: 100px; display: flex; flex-direction: column; align-items: center;
        }
        .placeholder-page svg { width: 64px; height: 64px; fill: #d0d0d0; margin-bottom: 20px; }

        /* Загрузка */
        .loader-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: white; z-index: 200; display: none;
            flex-direction: column; align-items: center; justify-content: center;
        }
        .spinner {
            width: 40px; height: 40px; border: 4px solid #f3f3f3; border-top: 4px solid #333;
            border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 15px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<svg style="display: none;">
    <symbol id="icon-search" viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></symbol>
    <symbol id="icon-heart" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></symbol>
    <symbol id="icon-bookmark" viewBox="0 0 24 24"><path d="M17 3H7c-1.1 0-1.99.9-1.99 2L5 21l7-3 7 3V5c0-1.1.9-2-2-2z"/></symbol>
    <symbol id="icon-home" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></symbol>
    <symbol id="icon-profile" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z"/></symbol>
</svg>

<div id="loader-screen" class="loader-screen">
    <div class="spinner"></div>
</div>

<div class="app-shell" id="app-shell">
    <div class="header">
        <div class="search-box">
            <svg class="search-icon" style="width:18px;height:18px;margin-right:8px;fill:#8e8e93;"><use xlink:href="#icon-search"></use></svg>
            поиск
        </div>
    </div>

    <div class="main-content">
        <div id="page-home" class="movie-grid page page-active"></div>
        
        <div id="page-fav" class="movie-grid page">
            <div style="grid-column: 1/3; text-align: center; color: #999; margin-top: 50px;">Тут будут ваши закладки</div>
        </div>
        
        <div id="page-profile" class="page profile-page">
            <div class="profile-header">профиль</div>
            
            <div class="user-block">
                <img id="user-avatar" class="user-avatar" src="" alt="Avatar">
                <div id="user-name" class="user-name">НИК</div>
            </div>
            
            <div class="stats-block">
                <div class="stats-icon"><svg><use xlink:href="#icon-heart"></use></svg></div>
                <div id="liked-count" class="stats-count">0</div>
            </div>
        </div>
    </div>

    <button id="ready-btn" class="ready-btn" onclick="activateFullModeWithLoader()">Далее</button>

    <div id="nav-wrapper" class="nav-wrapper">
        <div id="nav-bubble" class="nav-bubble"></div> <div class="nav-item nav-active" onclick="switchTab('home', this, 0)">
            <svg><use xlink:href="#icon-home"></use></svg>
        </div>
        <div class="nav-item" onclick="switchTab('fav', this, 1)">
            <svg><use xlink:href="#icon-bookmark"></use></svg>
        </div>
        <div class="nav-item" onclick="switchTab('profile', this, 2)">
            <svg><use xlink:href="#icon-profile"></use></svg>
        </div>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    // ЗАМЕНИ НА СВОЙ NGROK
    const API_URL = "https://unrebuked-overinsistently-chasidy.ngrok-free.dev"; 

    let allMovies = [];
    let likedIds = new Set(); // Храним ID лайкнутых фильмов

    async function load() {
        try {
            // !!! ЗАГРУЖАЕМ ДАННЫЕ ПРОФИЛЯ TELEGRAM !!!
            if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
                const user = tg.initDataUnsafe.user;
                document.getElementById('user-name').innerText = user.first_name + (user.last_name ? ' ' + user.last_name : '');
                if (user.photo_url) {
                    document.getElementById('user-avatar').src = user.photo_url;
                } else {
                    // Дефолтная серая аватарка, если нет фото
                    document.getElementById('user-avatar').style.background = '#e0e0e0';
                }
            }

            const resp = await fetch(`${API_URL}/movies`, { headers: {'ngrok-skip-browser-warning': 'true'} });
            allMovies = await resp.json();
            const grid = document.getElementById('page-home');
            
            allMovies.forEach(m => {
                const card = document.createElement('div');
                card.className = 'movie-card';
                card.innerHTML = `
                    <img src="${m.poster_url}" alt="${m.title}">
                    <div class="movie-info">${m.title}</div>
                    <div class="card-icon-btn btn-fav icon-btn-faved" onclick="this.classList.toggle('icon-active')">
                        <svg><use xlink:href="#icon-bookmark"></use></svg>
                    </div>
                    <div class="card-icon-btn btn-heart icon-btn-liked" onclick="this.classList.toggle('icon-active'); updateLikes(${m.id})">
                        <svg><use xlink:href="#icon-heart"></use></svg>
                    </div>
                `;
                grid.appendChild(card);
            });
        } catch(e) {}
    }

    // Логика лайков и ОБНОВЛЕНИЯ СЧЁТЧИКА В ПРОФИЛЕ
    function updateLikes(id) {
        if (likedIds.has(id)) {
            likedIds.delete(id);
        } else {
            likedIds.add(id);
        }
        // !!! ОБНОВЛЯЕМ ЦИФРУ В ПРОФИЛЕ !!!
        document.getElementById('liked-count').innerText = likedIds.size;
    }

    // Переход с загрузкой
    function activateFullModeWithLoader() {
        document.getElementById('loader-screen').style.display = 'flex';
        document.getElementById('app-shell').style.opacity = '0';

        setTimeout(() => {
            document.getElementById('loader-screen').style.display = 'none';
            document.getElementById('app-shell').style.opacity = '1';
            
            document.getElementById('ready-btn').style.display = 'none';
            document.getElementById('nav-wrapper').style.display = 'flex';
            document.querySelectorAll('.btn-fav').forEach(i => i.style.display = 'flex');
        }, 1500);
    }

    // Логика переключения вкладок и перемещения пузырька
    function switchTab(tabId, el, index) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('page-active', 'profile-active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('nav-active'));
        
        const targetPage = document.getElementById('page-' + tabId);
        
        // Специфично для профиля, т.к. он флекс
        if (tabId === 'profile') {
            targetPage.classList.add('profile-active');
        } else {
            targetPage.classList.add('page-active');
        }
        
        el.classList.add('nav-active');
        
        // !!! ПЕРЕМЕЩАЕМ КРУПНЫЙ ПУЗЫРЁК !!!
        const bubble = document.getElementById('nav-bubble');
        bubble.style.transform = `translateX(${index * 95}px)`; // Шаг перемещения

        // Вибрация Telegram
        if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
    }

    load();
</script>
</body>
</html>
