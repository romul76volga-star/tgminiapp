<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FilmsBot AI</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --bg: #ffffff; --text: #000; --accent: #ff3b30; }
        body { 
            margin: 0; padding: 0; background: var(--bg); color: var(--text);
            font-family: -apple-system, system-ui, sans-serif; height: 100vh; overflow: hidden;
        }
        .header {
            padding: 15px; background: rgba(255,255,255,0.8); backdrop-filter: blur(10px);
            border-bottom: 0.5px solid #eee; position: sticky; top: 0; z-index: 10;
        }
        .search-bar {
            background: #f0f0f0; border-radius: 10px; padding: 8px 12px; display: flex; align-items: center;
        }
        .search-bar input {
            border: none; background: transparent; outline: none; width: 100%; font-size: 16px;
        }
        .scroll-area { 
            height: calc(100vh - 70px); overflow-y: auto; padding: 15px; padding-bottom: 150px;
        }
        .movie-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .movie-card { background: #fff; border-radius: 15px; overflow: hidden; position: relative; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .movie-card img { width: 100%; height: 240px; object-fit: cover; background: #eee; display: block; }
        .movie-title { padding: 8px; text-align: center; font-size: 13px; font-weight: 600; min-height: 32px; }
        
        .btn-overlay {
            position: absolute; top: 8px; width: 32px; height: 32px;
            background: #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center;
            border: none; box-shadow: 0 2px 5px rgba(0,0,0,0.2); z-index: 5;
        }
        .btn-dislike { left: 8px; opacity: 0; pointer-events: none; }
        .btn-heart { right: 8px; }
        .btn-overlay svg { width: 18px; height: 18px; fill: #ccc; }
        .is-liked svg { fill: var(--accent) !important; }

        .next-btn {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            padding: 15px 40px; border-radius: 25px; border: none;
            background: #000; color: #fff; font-weight: 700; z-index: 100;
        }
        .bottom-nav {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            width: 80%; height: 60px; background: #fff; border-radius: 30px;
            display: none; align-items: center; justify-content: space-around;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1); border: 1px solid #eee;
        }
        .status-msg { text-align: center; margin-top: 100px; color: #888; font-weight: 500; padding: 20px; }
    </style>
</head>
<body>

    <div class="header">
        <div class="search-bar">
            <input type="text" id="movie-search" placeholder="Поиск фильма...">
        </div>
    </div>

    <div class="scroll-area">
        <div id="home" class="movie-grid">
            <div class="status-msg">Загрузка данных...</div>
        </div>
        <div id="favs" class="movie-grid" style="display:none"></div>
    </div>

    <button id="next-btn" class="next-btn" onclick="unlockApp()">Далее</button>

    <div id="navbar" class="bottom-nav">
        <div onclick="showPage('home')" style="padding:10px">🏠</div>
        <div onclick="showPage('favs')" style="padding:10px">❤️</div>
    </div>

<script>
    const tg = window.Telegram.WebApp;
    // !!! ВСТАВЬ СВОЮ ССЫЛКУ ИЗ ТЕРМИНАЛА NGROK НИЖЕ !!!
    const API = "https://unrebuked-overinsistently-chasidy.ngrok-free.dev"; 
    
    let allMovies = [];
    let likes = new Set();
    let isUnlocked = false;

    async function init() {
        tg.ready();
        tg.expand();
        try {
            console.log("Запрос к:", `${API}/movies`);
            const r = await fetch(`${API}/movies`, { 
                headers: {'ngrok-skip-browser-warning': 'true'} 
            });
            if (!r.ok) throw new Error("Сервер ответил ошибкой");
            allMovies = await r.json();
            
            if (allMovies.length === 0) {
                document.getElementById('home').innerHTML = '<div class="status-msg">База пуста. Запусти fill_db.py!</div>';
            } else {
                renderMovies(allMovies, 'home');
            }
        } catch(e) {
            document.getElementById('home').innerHTML = `<div class="status-msg" style="color:red">ОШИБКА ПОДКЛЮЧЕНИЯ!<br><small>${e.message}</small><br><br>Проверь ссылку API в коде и запущен ли main.py</div>`;
        }
    }

    function renderMovies(list, targetId) {
        const box = document.getElementById(targetId);
        box.innerHTML = '';
        list.forEach(m => {
            const card = document.createElement('div');
            card.className = 'movie-card';
            // Используем прокси weserv для гарантированного показа картинок
            const safePoster = m.poster_url.includes('weserv') ? m.poster_url : `https://images.weserv.nl/?url=${m.poster_url.replace('http://', 'https://')}`;
            
            card.innerHTML = `
                <img src="${safePoster}" referrerpolicy="no-referrer" onerror="this.src='https://via.placeholder.com/240x350?text=No+Photo'">
                <div class="movie-title">${m.title}</div>
                <button class="btn-overlay btn-dislike" style="opacity:${isUnlocked?1:0}; pointer-events:${isUnlocked?'auto':'none'}" onclick="handleRate(${m.id}, 'dislike')">❌</button>
                <button class="btn-overlay btn-heart ${likes.has(m.id)?'is-liked':''}" onclick="handleRate(${m.id}, 'like', this)">❤️</button>
            `;
            box.appendChild(card);
        });
    }

    function handleRate(id, action, btn) {
        tg.HapticFeedback.impactOccurred('light');
        if (action === 'like') {
            likes.add(id);
            if (btn) btn.classList.add('is-liked');
        }
        fetch(`${API}/rate`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ movie_id: id, action: action })
        });
        if (isUnlocked) loadRecs();
    }

    async function unlockApp() {
        isUnlocked = true;
        document.getElementById('next-btn').style.display = 'none';
        document.getElementById('navbar').style.display = 'flex';
        document.querySelectorAll('.btn-dislike').forEach(b => { b.style.opacity = 1; b.style.pointerEvents = 'auto'; });
        loadRecs();
    }

    async function loadRecs() {
        const r = await fetch(`${API}/recommend`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ liked_movies: Array.from(likes), disliked_movies: [] })
        });
        allMovies = await r.json();
        renderMovies(allMovies, 'home');
    }

    function showPage(id) {
        if (id === 'home') {
            document.getElementById('home').style.display = 'grid';
            document.getElementById('favs').style.display = 'none';
        } else {
            document.getElementById('home').style.display = 'none';
            document.getElementById('favs').style.display = 'grid';
            const favMovies = allMovies.filter(m => likes.has(m.id));
            renderMovies(favMovies, 'favs');
        }
    }

    init();
</script>
</body>
</html>
