<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FilmsBot Ultimate</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --glass: rgba(255, 255, 255, 0.7); --border: rgba(255, 255, 255, 0.3); }
        
        body { 
            margin: 0; padding: 0; background-color: #fff; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            height: 100vh; overflow: hidden; color: #000;
        }

        /* ГОРЯЧАЯ ПРАВКА: СТЕКЛО СВЕРХУ */
        .header {
            position: sticky; top: 0; z-index: 100;
            background: var(--glass); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            padding: 10px 15px; border-bottom: 0.5px solid rgba(0,0,0,0.1);
        }

        .search-container {
            background: rgba(0, 0, 0, 0.05); border-radius: 12px;
            padding: 8px 12px; display: flex; align-items: center; gap: 10px;
        }
        .search-container img { width: 18px; height: 18px; opacity: 0.6; } /* Твоя лупа */
        .search-text { color: #8e8e93; font-size: 17px; }

        /* СЕТКА ФИЛЬМОВ */
        .content { height: calc(100vh - 60px); overflow-y: auto; padding: 15px; padding-bottom: 120px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }

        /* КАРТОЧКА: ПРАВИЛЬНЫЙ РАЗМЕР */
        .card { 
            background: #fff; border-radius: 20px; overflow: hidden; position: relative;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); display: flex; flex-direction: column;
        }
        .card img { width: 100%; height: 240px; object-fit: cover; }
        .card-title { padding: 10px; text-align: center; font-weight: 600; font-size: 15px; }

        /* КНОПКИ НА ПОСТЕРЕ */
        .card-btn {
            position: absolute; top: 10px; width: 35px; height: 35px;
            background: rgba(255, 255, 255, 0.9); border-radius: 50%;
            display: flex; align-items: center; justify-content: center; border: none;
        }
        .btn-dislike { left: 10px; opacity: 0; transition: 0.3s; } /* Появится после 'Далее' */
        .btn-like { right: 10px; }
        .card-btn img { width: 20px; height: 20px; }

        /* КНОПКА ДАЛЕЕ: ЭФФЕКТ СТЕКЛА */
        .next-btn {
            position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%);
            padding: 12px 45px; border-radius: 25px; border: 1px solid var(--border);
            background: rgba(0, 0, 0, 0.8); color: white; font-weight: bold;
            backdrop-filter: blur(10px); z-index: 1000;
        }

        /* НИЖНЯЯ ПАНЕЛЬ: СТЕКЛО */
        .nav {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 350px; height: 65px;
            background: var(--glass); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-radius: 35px; display: none; align-items: center; justify-content: space-around;
            border: 1px solid var(--border); box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .nav-item { opacity: 0.3; transition: 0.3s; }
        .nav-item.active { opacity: 1; transform: scale(1.1); }
        .nav-item img { width: 28px; height: 28px; }

        /* ПРОФИЛЬ: ИДЕАЛЬНО РОВНО */
        #page-profile { 
            display: none; flex-direction: column; align-items: center; 
            justify-content: center; text-align: center; padding-top: 40px; 
        }
        .profile-avatar { 
            width: 100px; height: 100px; border-radius: 50%; 
            background: #eee; margin-bottom: 20px; object-fit: cover;
        }
        .profile-name { font-size: 24px; font-weight: 800; margin-bottom: 30px; }
        .likes-box { display: flex; align-items: center; gap: 15px; }
        .likes-box img { width: 40px; height: 40px; opacity: 0.2; }
        .likes-count { font-size: 48px; font-weight: 300; color: #000; }

        /* ИЗБРАННОЕ */
        #page-fav { display: none; }
        .empty-msg { 
            grid-column: 1/3; text-align: center; margin-top: 100px; 
            font-weight: bold; font-size: 20px; 
        }

        .active-page { display: grid !important; }
        .active-profile { display: flex !important; }
    </style>
</head>
<body>

    <div class="header">
        <div class="search-container">
            <img src="https://img.icons8.com/ios-filled/50/000000/search--v1.png" alt="search">
            <span class="search-text">поиск</span>
        </div>
    </div>

    <div class="content">
        <div id="page-home" class="grid active-page"></div>

        <div id="page-fav" class="grid">
            <div class="empty-msg"><b>упс ваш список пуст</b></div>
        </div>

        <div id="page-profile">
            <img id="user-pic" class="profile-avatar" src="https://www.w3schools.com/howto/img_avatar.png">
            <div class="profile-name" id="user-name">ROMA</div>
            <div class="likes-box">
                <img src="https://img.icons8.com/ios-filled/50/000000/like--v1.png">
                <div class="likes-count" id="count-num">0</div>
            </div>
        </div>
    </div>

    <button class="next-btn" id="btn-next" onclick="goNext()">Далее</button>

    <div class="nav" id="main-nav">
        <div class="nav-item active" onclick="showPage('home', this)">
            <img src="https://img.icons8.com/material-outlined/48/000000/home--v2.png">
        </div>
        <div class="nav-item" onclick="showPage('fav', this)">
            <img src="https://img.icons8.com/material-outlined/48/000000/bookmark-ribbon--v1.png">
        </div>
        <div class="nav-item" onclick="showPage('profile', this)">
            <img src="https://img.icons8.com/material-outlined/48/000000/user-male-circle.png">
        </div>
    </div>

<script>
    const tg = window.Telegram.WebApp;
    const API_URL = "https://unrebuked-overinsistently-chasidy.ngrok-free.dev"; 
    let movies = [];
    let likedSet = new Set();

    async function loadData() {
        // Данные юзера
        if (tg.initDataUnsafe?.user) {
            document.getElementById('user-name').innerText = tg.initDataUnsafe.user.first_name.toUpperCase();
            if (tg.initDataUnsafe.user.photo_url) document.getElementById('user-pic').src = tg.initDataUnsafe.user.photo_url;
        }

        const res = await fetch(`${API_URL}/movies`, { headers: {'ngrok-skip-browser-warning': 'true'} });
        movies = await res.json();
        const home = document.getElementById('page-home');

        movies.forEach(m => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <img src="${m.poster_url}">
                <div class="card-title">фильм</div>
                <button class="card-btn btn-dislike" onclick="this.style.opacity=0.5">
                    <img src="https://img.icons8.com/ios/50/000000/dislike.png">
                </button>
                <button class="card-btn btn-like" onclick="toggleLike(this, ${m.id})">
                    <img src="https://img.icons8.com/ios-filled/50/000000/like--v1.png" style="tint-color: #ccc">
                </button>
            `;
            home.appendChild(card);
        });
    }

    function toggleLike(btn, id) {
        const img = btn.querySelector('img');
        if (likedSet.has(id)) {
            likedSet.delete(id);
            img.style.filter = "grayscale(100%)";
        } else {
            likedSet.add(id);
            img.style.filter = "none";
            img.style.color = "red";
        }
        document.getElementById('count-num').innerText = likedSet.size;
        tg.HapticFeedback.impactOccurred('light');
    }

    function goNext() {
        document.getElementById('btn-next').style.display = 'none';
        document.getElementById('main-nav').style.display = 'flex';
        document.querySelectorAll('.btn-dislike').forEach(b => b.style.opacity = '1');
    }

    function showPage(pageId, el) {
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        el.classList.add('active');

        document.getElementById('page-home').classList.remove('active-page');
        document.getElementById('page-fav').classList.remove('active-page');
        document.getElementById('page-profile').classList.remove('active-profile');

        if (pageId === 'profile') {
            document.getElementById('page-profile').classList.add('active-profile');
        } else {
            document.getElementById('page-' + pageId).classList.add('active-page');
        }

        if (pageId === 'fav') renderFavs();
    }

    function renderFavs() {
        const favPage = document.getElementById('page-fav');
        favPage.innerHTML = '';
        const likedMovies = movies.filter(m => likedSet.has(m.id));

        if (likedMovies.length === 0) {
            favPage.innerHTML = '<div class="empty-msg"><b>упс ваш список пуст</b></div>';
        } else {
            likedMovies.forEach(m => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `<img src="${m.poster_url}"><div class="card-title">фильм</div>`;
                favPage.appendChild(card);
            });
        }
    }

    loadData();
    tg.expand();
</script>
</body>
</html>
