<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FilmsBot Pro UI</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --glass: rgba(255, 255, 255, 0.7); --border: rgba(255, 255, 255, 0.3); }
        
        body { 
            margin: 0; padding: 0; background-color: #f5f5f7; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            height: 100vh; overflow: hidden;
        }

        /* Полный экран, белый фон */
        .app-shell { background: white; width: 100%; height: 100%; display: flex; flex-direction: column; position: relative; }

        /* ВЕРХ: ПОИСК (СТЕКЛО) */
        .header {
            padding: 10px 15px; background: var(--glass); 
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); 
            sticky: top; z-index: 100;
        }
        .search-container {
            background: rgba(0, 0, 0, 0.05); border-radius: 12px;
            padding: 8px 12px; display: flex; align-items: center; gap: 10px;
        }
        .search-container svg { width: 18px; height: 18px; fill: #8e8e93; }
        .search-text { color: #8e8e93; font-size: 17px; }

        /* СЕТКА ФИЛЬМОВ */
        .content { height: calc(100vh - 60px); overflow-y: auto; padding: 15px; padding-bottom: 150px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }

        /* КАРТОЧКА */
        .card { 
            background: #fff; border-radius: 20px; overflow: hidden; position: relative;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); display: flex; flex-direction: column;
        }
        .card img { width: 100%; height: 210px; object-fit: cover; }
        .card-title { padding: 10px; text-align: center; font-weight: 600; font-size: 15px; }

        /* КНОПКИ НА ПОСТЕРЕ */
        .card-btn {
            position: absolute; top: 10px; width: 35px; height: 35px;
            background: rgba(255, 255, 255, 0.9); border-radius: 50%;
            display: flex; align-items: center; justify-content: center; border: none;
        }
        
        .btn-fav { left: 10px; opacity: 0; transition: 0.3s; } /* Закладка слева, появится после 'Я готов!' */
        .btn-heart { right: 10px; } /* Сердце справа */
        .card-btn svg { width: 22px; height: 22px; fill: #b0b0b0; transition: 0.2s; }
        
        /* !!! НОВАЯ ЛОГИКА ЗАKРАШИВАНИЯ !!! */
        .liked-active svg { fill: #333333 !important; } /* Дизлайк становится темно-серым при нажатии */

        /* НИЖНЕЕ МЕНЮ */
        .nav {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            width: 85%; max-width: 320px; height: 65px;
            background: var(--glass); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-radius: 35px; display: none; align-items: center; justify-content: space-around;
            border: 1px solid var(--border); box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .nav-item { display: flex; flex-direction: column; align-items: center; width: 60px; height: 100%; cursor: pointer; }
        
        /* КРУПНЫЕ SVG В НАВИГАЦИИ */
        .nav-item svg { width: 26px; height: 26px; fill: #b0b0b0; transition: 0.2s; }
        
        /* Активная вкладка */
        .nav-active svg { fill: #333333 !important; }

        /* КНОПКА Я ГОТОВ */
        .ready-btn {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            padding: 14px 50px; border-radius: 30px;
            background: rgba(0, 0, 0, 0.85); color: white;
            font-weight: bold; font-size: 16px; border: none;
            backdrop-filter: blur(10px); z-index: 100;
        }

        .active-page { display: grid !important; }
        .page { display: none; width: 100%; height: 100%; }
    </style>
</head>
<body>

<svg style="display: none;">
    <symbol id="icon-search" viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></symbol>
    <symbol id="icon-heart" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></symbol>
    
    <symbol id="icon-dislike" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z M1 1 L23 23" stroke="#b0b0b0" stroke-width="2" fill="none"/></symbol>
    
    <symbol id="icon-home" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></symbol>
    <symbol id="icon-profile" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z"/></symbol>
</svg>

<div class="app-shell">
    <div class="header">
        <div class="search-container">
            <svg><use xlink:href="#icon-search"></use></svg> поиск
        </div>
    </div>

    <div class="content">
        <div id="page-home" class="grid active-page"></div>
        
        <div id="page-fav" class="grid page">
            <div style="grid-column: 1/3; text-align: center; color: #999; margin-top: 50px;">Тут будут ваши фильмы...</div>
        </div>
        
        <div id="page-profile" class="page" style="text-align: center; padding-top: 60px;"><h3>Настройки профиля</h3></div>
    </div>

    <button id="ready-btn" class="ready-btn" onclick="activateFullMode()">Я готов!</button>

    <div id="main-nav" class="nav">
        <div class="nav-item nav-active" onclick="showPage('home', this)"><svg><use xlink:href="#icon-home"></use></svg></div>
        <div class="nav-item" onclick="showPage('fav', this)"><svg><use xlink:href="#icon-heart"></use></svg></div>
        <div class="nav-item" onclick="showPage('profile', this)"><svg><use xlink:href="#icon-profile"></use></svg></div>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    // ЗАМЕНИ НА СВОЙ NGROK
    const API_URL = "https://unrebuked-overinsistently-chasidy.ngrok-free.dev"; 
    
    let allMovies = [];
    let likedSet = new Set(); // Храним ID лайкнутых фильмов

    async function loadData() {
        // Подгружаем имя юзера (если доступно)
        if (tg.initDataUnsafe?.user) {
            document.querySelector('#page-profile h3').innerText = tg.initDataUnsafe.user.first_name + ' Профиль';
        }

        const res = await fetch(`${API_URL}/movies`, { headers: {'ngrok-skip-browser-warning': 'true'} });
        allMovies = await res.json();
        const home = document.getElementById('page-home');

        allMovies.forEach(m => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <img src="${m.poster_url}">
                <div class="card-title">фильм</div>
                
                <button class="card-btn btn-fav" onclick="this.classList.toggle('liked-active')">
                    <svg><use xlink:href="#icon-dislike"></use></svg>
                </button>
                
                <button class="card-btn btn-heart" onclick="toggleLike(this, ${m.id})">
                    <svg><use xlink:href="#icon-heart"></use></svg>
                </button>
            `;
            home.appendChild(card);
        });
    }

    // ЛОГИКА СЕРДЦА (Перемещение во вкладку)
    function toggleLike(btn, id) {
        btn.classList.toggle('liked-active');
        if (btn.classList.contains('liked-active')) {
            likedSet.add(id);
        } else {
            likedSet.delete(id);
        }
    }

    // Режим после нажатия "Я готов"
    function activateFullMode() {
        document.getElementById('ready-btn').style.display = 'none';
        document.getElementById('main-nav').style.display = 'flex';
        // Показываем закладки на карточках
        document.querySelectorAll('.btn-fav').forEach(i => i.style.opacity = '1');
    }

    function showPage(pageId, el) {
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('nav-active'));
        el.classList.add('nav-active');

        document.getElementById('page-home').classList.remove('active-page');
        document.getElementById('page-fav').classList.remove('active-page');
        document.getElementById('page-profile').classList.remove('active-page');

        document.getElementById('page-' + pageId).classList.add('active-page');

        if (pageId === 'fav') renderFavs();
    }

    // Рендер лайкнутых фильмов (Сердце)
    function renderFavs() {
        const favPage = document.getElementById('page-fav');
        favPage.innerHTML = ''; // Очищаем старое
        const likedMovies = allMovies.filter(m => likedSet.has(m.id));

        if (likedMovies.length === 0) {
            favPage.innerHTML = '<div style="grid-column: 1/3; text-align: center; color: #999; margin-top: 50px;">У вас пока нет фильмов...</div>';
        } else {
            likedMovies.forEach(m => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `<img src="${m.poster_url}"><div class="card-title">фильм</div>`;
                favPage.appendChild(card);
            });
        }
    }

    loadData();
    tg.expand();
</script>
</body>
</html>
