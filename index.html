<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FilmsBot AI</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --tg-theme-bg: #fff;
            --tg-theme-text: #000;
            --accent: #ff3b30;
        }
        
        body { 
            margin: 0; padding: 0; background-color: var(--tg-theme-bg); 
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            height: 100vh; overflow: hidden; color: var(--tg-theme-text);
        }

        /* ШАПКА */
        .header {
            position: sticky; top: 0; z-index: 100;
            background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            padding: 12px 15px; border-bottom: 0.5px solid rgba(0,0,0,0.1);
        }
        .search-bar {
            background: rgba(0, 0, 0, 0.05); border-radius: 12px;
            padding: 8px 12px; display: flex; align-items: center; gap: 10px;
        }
        .search-bar input {
            border: none; background: transparent; outline: none; width: 100%;
            font-size: 17px; color: #000; -webkit-appearance: none;
        }
        .search-bar svg { width: 18px; height: 18px; fill: #8e8e93; }

        /* КОНТЕНТ */
        .scroll-area { 
            height: calc(100vh - 65px); overflow-y: auto; 
            padding: 15px; padding-bottom: 180px; 
            -webkit-overflow-scrolling: touch;
        }
        .movie-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }

        /* КАРТОЧКА */
        .movie-card { background: #fff; border-radius: 18px; overflow: hidden; position: relative; transition: 0.3s; }
        .movie-card img { 
            width: 100%; height: 260px; 
            object-fit: cover; background: #f0f0f0; border-radius: 18px;
            display: block;
        }
        .movie-title { 
            padding: 8px 4px; text-align: center; 
            font-weight: 600; font-size: 14px; line-height: 1.2;
        }

        /* КНОПКИ УПРАВЛЕНИЯ */
        .btn-overlay {
            position: absolute; top: 10px; width: 34px; height: 34px;
            background: rgba(255,255,255,0.9); border-radius: 50%;
            display: flex; align-items: center; justify-content: center; border: none;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); z-index: 5;
        }
        .btn-dislike { left: 10px; opacity: 0; pointer-events: none; transition: 0.3s; }
        .btn-heart { right: 10px; }
        .btn-overlay svg { width: 20px; height: 20px; fill: #b0b0b0; transition: 0.2s; }

        /* СОСТОЯНИЯ */
        .is-liked svg { fill: var(--accent) !important; }
        .is-disliked svg { fill: #333 !important; }
        .pulse { transform: scale(1.2); }

        /* КНОПКА ДАЛЕЕ */
        .next-btn {
            position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
            padding: 16px 50px; border-radius: 30px; border: none;
            background: #000; color: #fff; font-weight: 700; font-size: 16px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3); z-index: 1000;
        }

        /* НАВИГАЦИЯ */
        .bottom-nav {
            position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%);
            width: 80%; max-width: 300px; height: 60px;
            background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(20px);
            border-radius: 30px; display: none; align-items: center; justify-content: space-around;
            border: 1px solid rgba(0,0,0,0.05); box-shadow: 0 8px 25px rgba(0,0,0,0.1);
        }
        .nav-link { opacity: 0.3; transition: 0.2s; }
        .nav-link.active { opacity: 1; transform: scale(1.1); }
        .nav-link svg { width: 26px; height: 26px; fill: #000; }

        /* ПРОФИЛЬ */
        .page { display: none; width: 100%; }
        .active-page { display: grid; }
        .profile-wrap { display: none; flex-direction: column; align-items: center; padding-top: 40px; }
        .avatar { width: 100px; height: 100px; border-radius: 50%; background: #eee; margin-bottom: 15px; }
        .u-name { font-size: 22px; font-weight: 800; }
        
        .empty-msg { grid-column: 1/3; text-align: center; margin-top: 50px; opacity: 0.5; font-weight: 600; }
    </style>
</head>
<body>

    <svg style="display:none;">
        <symbol id="icon-search" viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></symbol>
        <symbol id="icon-heart" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></symbol>
        <symbol id="icon-dislike" viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></symbol>
        <symbol id="icon-home" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></symbol>
        <symbol id="icon-profile" viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></symbol>
    </svg>

    <div class="header">
        <div class="search-bar">
            <svg><use xlink:href="#icon-search"></use></svg>
            <input type="text" id="movie-search" placeholder="Поиск фильма...">
        </div>
    </div>

    <div class="scroll-area">
        <div id="home" class="movie-grid page active-page"></div>
        <div id="favs" class="movie-grid page"></div>
        <div id="profile" class="profile-wrap">
            <img id="u-pic" class="avatar" src="https://www.w3schools.com/howto/img_avatar.png">
            <div id="u-name" class="u-name">USER</div>
            <div style="margin-top:20px; font-size: 18px;">Лайков: <span id="l-count" style="font-weight:800;">0</span></div>
        </div>
    </div>

    <button id="next-btn" class="next-btn" onclick="unlockApp()">Далее</button>

    <div id="navbar" class="bottom-nav">
        <div class="nav-link active" onclick="tab('home', this)"><svg><use xlink:href="#icon-home"></use></svg></div>
        <div class="nav-link" onclick="tab('favs', this)"><svg><use xlink:href="#icon-heart"></use></svg></div>
        <div class="nav-link" onclick="tab('profile', this)"><svg><use xlink:href="#icon-profile"></use></svg></div>
    </div>

<script>
    const tg = window.Telegram.WebApp;
    // УБЕДИСЬ, ЧТО ЭТОТ URL АКТУАЛЕН (NGROK)
    const API = "https://unrebuked-overinsistently-chasidy.ngrok-free.dev"; 
    
    let allMovies = [];
    let likes = new Set();
    let dislikes = new Set();
    let isUnlocked = false;

    async function init() {
        tg.ready();
        if (tg.initDataUnsafe?.user) {
            document.getElementById('u-name').innerText = tg.initDataUnsafe.user.first_name.toUpperCase();
            if (tg.initDataUnsafe.user.photo_url) document.getElementById('u-pic').src = tg.initDataUnsafe.user.photo_url;
        }

        try {
            const r = await fetch(`${API}/movies`, { headers: {'ngrok-skip-browser-warning': 'true'} });
            allMovies = await r.json();
            renderMovies(allMovies);
        } catch(e) { console.error("Ошибка загрузки"); }
    }

    function renderMovies(list) {
        const box = document.getElementById('home');
        box.innerHTML = '';
        list.forEach(m => {
            const card = document.createElement('div');
            card.className = 'movie-card';
            card.innerHTML = `
                <img src="${m.poster_url}" onerror="this.src='https://via.placeholder.com/260x380?text=No+Poster'">
                <div class="movie-title">${m.title}</div>
                <button class="btn-overlay btn-dislike" style="opacity: ${isUnlocked ? 1 : 0}; pointer-events: ${isUnlocked ? 'auto' : 'none'}" onclick="doDislike(this, ${m.id})">
                    <svg><use xlink:href="#icon-dislike"></use></svg>
                </button>
                <button class="btn-overlay btn-heart ${likes.has(m.id)?'is-liked':''}" onclick="doLike(this, ${m.id})">
                    <svg><use xlink:href="#icon-heart"></use></svg>
                </button>
            `;
            box.appendChild(card);
        });
    }

    // ПОИСК
    document.getElementById('movie-search').addEventListener('input', (e) => {
        const query = e.target.value.toLowerCase();
        const filtered = allMovies.filter(m => m.title.toLowerCase().includes(query));
        renderMovies(filtered);
    });

    async function doLike(btn, id) {
        btn.classList.add('pulse'); setTimeout(() => btn.classList.remove('pulse'), 200);
        if (likes.has(id)) {
            likes.delete(id);
            btn.classList.remove('is-liked');
        } else {
            likes.add(id);
            dislikes.delete(id);
            btn.classList.add('is-liked');
            btn.parentElement.querySelector('.btn-dislike').classList.remove('is-disliked');
        }
        updateCounter();
        sendRate(id, 'like');
        if (isUnlocked) loadRecommendations();
    }

    async function doDislike(btn, id) {
        btn.classList.add('pulse'); setTimeout(() => btn.classList.remove('pulse'), 200);
        if (dislikes.has(id)) {
            dislikes.delete(id);
            btn.classList.remove('is-disliked');
        } else {
            dislikes.add(id);
            likes.delete(id);
            btn.classList.add('is-disliked');
            btn.parentElement.querySelector('.btn-heart').classList.remove('is-liked');
        }
        updateCounter();
        sendRate(id, 'dislike');
        if (isUnlocked) loadRecommendations();
    }

    function updateCounter() {
        document.getElementById('l-count').innerText = likes.size;
        tg.HapticFeedback.impactOccurred('light');
    }

    async function sendRate(id, action) {
        fetch(`${API}/rate`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ movie_id: id, action: action })
        });
    }

    async function unlockApp() {
        isUnlocked = true;
        document.getElementById('next-btn').style.display = 'none';
        document.getElementById('navbar').style.display = 'flex';
        loadRecommendations();
        tg.HapticFeedback.notificationOccurred('success');
    }

    async function loadRecommendations() {
        const r = await fetch(`${API}/recommend`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ liked_movies: Array.from(likes), disliked_movies: Array.from(dislikes) })
        });
        allMovies = await r.json();
        renderMovies(allMovies);
    }

    function tab(id, el) {
        document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('active'));
        el.classList.add('active');
        document.querySelectorAll('.page, .profile-wrap').forEach(p => p.style.display = 'none');
        
        if (id === 'profile') {
            document.getElementById('profile').style.display = 'flex';
        } else if (id === 'favs') {
            document.getElementById('favs').style.display = 'grid';
            renderFavs();
        } else {
            document.getElementById('home').style.display = 'grid';
        }
    }

    function renderFavs() {
        const box = document.getElementById('favs');
        box.innerHTML = '';
        const favs = allMovies.filter(m => likes.has(m.id));
        if (favs.length === 0) {
            box.innerHTML = '<div class="empty-msg">СПИСОК ЛЮБИМЫХ ПУСТ</div>';
        } else {
            favs.forEach(m => {
                const card = document.createElement('div');
                card.className = 'movie-card';
                card.innerHTML = `<img src="${m.poster_url}"><div class="movie-title">${m.title}</div>`;
                box.appendChild(card);
            });
        }
    }

    init();
    tg.expand();
</script>
</body>
</html>
