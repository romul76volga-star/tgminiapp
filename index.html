<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FilmsBot Final UI</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            margin: 0; padding: 0; background-color: #f8f8f8;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            height: 100vh; overflow: hidden;
        }

        .app-shell { background: white; width: 100%; height: 100%; display: flex; flex-direction: column; position: relative; }

        /* ШАПКА И ПОИСК */
        .header { padding: 10px 15px; background: white; border-bottom: 1px solid #efefef; }
        .search-box { 
            background: #ededed; border-radius: 12px; padding: 8px 12px; 
            display: flex; align-items: center; gap: 8px; color: #8e8e93; font-size: 17px;
        }
        .search-box svg { width: 18px; height: 18px; fill: #8e8e93; }

        /* СЕТКА ФИЛЬМОВ */
        .main-content { flex: 1; overflow-y: auto; padding: 15px 15px 100px 15px; }
        .movie-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

        /* КАРТОЧКА ФИЛЬМА */
        .movie-card {
            background: #fff; border-radius: 18px; overflow: hidden;
            display: flex; flex-direction: column; position: relative;
            box-shadow: 0 4px 15px rgba(0,0,0,0.04);
        }
        /* УВЕЛИЧЕННЫЙ ПОСТЕР */
        .movie-card img { width: 100%; height: 280px; object-fit: cover; }
        
        .movie-info { padding: 12px 8px; text-align: center; font-size: 15px; font-weight: 700; color: #000; }

        /* КНОПКИ НА ПОСТЕРЕ */
        .card-btn {
            position: absolute; top: 10px; width: 36px; height: 36px;
            background: rgba(255,255,255,0.85); backdrop-filter: blur(8px);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            border: none; box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .btn-dislike { left: 10px; display: none; } /* Слева */
        .btn-heart { right: 10px; } /* Справа */
        .card-btn svg { width: 20px; height: 20px; fill: #b0b0b0; }
        
        /* Активные состояния */
        .liked svg { fill: #ff3b30 !important; }
        .disliked svg { fill: #333 !important; }

        /* СТЕКЛЯННАЯ КНОПКА ДАЛЕЕ */
        .ready-btn {
            position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%);
            padding: 14px 60px; font-size: 17px; font-weight: 700; color: white;
            background: rgba(0, 0, 0, 0.3); backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 25px;
            z-index: 100; box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        /* НИЖНЕЕ МЕНЮ */
        .nav-wrapper {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            width: 280px; height: 64px; background: rgba(255,255,255,0.9);
            backdrop-filter: blur(20px); border-radius: 32px;
            display: none; align-items: center; justify-content: space-around;
            border: 1px solid #eee; box-shadow: 0 8px 30px rgba(0,0,0,0.08);
        }
        .nav-item { width: 50px; height: 50px; display: flex; align-items: center; justify-content: center; opacity: 0.3; transition: 0.2s; }
        .nav-active { opacity: 1; transform: scale(1.1); }
        .nav-item svg { width: 28px; height: 28px; fill: #000; }

        /* ПУСТОЕ ИЗБРАННОЕ */
        .empty-fav { 
            grid-column: 1/3; text-align: center; margin-top: 100px;
            font-size: 22px; font-weight: 800; color: #333;
        }

        .page { display: none; }
        .page-active { display: grid; }
        
        /* Профиль */
        .profile-page { padding: 40px 20px; text-align: center; }
        .avatar { width: 100px; height: 100px; border-radius: 50%; background: #eee; margin-bottom: 15px; }
    </style>
</head>
<body>

<svg style="display: none;">
    <symbol id="icon-search" viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></symbol>
    <symbol id="icon-heart" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></symbol>
    <symbol id="icon-dislike" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z M2 2 L22 22" fill="none" stroke="currentColor" stroke-width="2"/></symbol>
    <symbol id="icon-home" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></symbol>
    <symbol id="icon-profile" viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></symbol>
</svg>

<div class="app-shell">
    <div class="header">
        <div class="search-box">
            <svg><use xlink:href="#icon-search"></use></svg> поиск
        </div>
    </div>

    <div class="main-content">
        <div id="page-home" class="movie-grid page page-active"></div>
        
        <div id="page-fav" class="movie-grid page">
            <div id="fav-empty" class="empty-fav">Упс, ваш список пуст!</div>
        </div>

        <div id="page-profile" class="page profile-page">
            <img class="avatar" src="" id="user-pic">
            <h2 id="user-name">Загрузка...</h2>
        </div>
    </div>

    <button id="ready-btn" class="ready-btn" onclick="startApp()">Я готов!</button>

    <div id="nav" class="nav-wrapper">
        <div class="nav-item nav-active" onclick="showPage('home', this)"><svg><use xlink:href="#icon-home"></use></svg></div>
        <div class="nav-item" onclick="showPage('fav', this)"><svg><use xlink:href="#icon-heart"></use></svg></div>
        <div class="nav-item" onclick="showPage('profile', this)"><svg><use xlink:href="#icon-profile"></use></svg></div>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    const API_URL = "https://unrebuked-overinsistently-chasidy.ngrok-free.dev"; 
    let moviesData = [];
    let likedSet = new Set();

    async function loadMovies() {
        if (tg.initDataUnsafe?.user) {
            document.getElementById('user-name').innerText = tg.initDataUnsafe.user.first_name;
            document.getElementById('user-pic').src = tg.initDataUnsafe.user.photo_url || "";
        }

        const res = await fetch(`${API_URL}/movies`, { headers: {'ngrok-skip-browser-warning': 'true'} });
        moviesData = await res.json();
        const grid = document.getElementById('page-home');

        moviesData.forEach(m => {
            const card = document.createElement('div');
            card.className = 'movie-card';
            card.innerHTML = `
                <img src="${m.poster_url}">
                <div class="movie-info">${m.title}</div>
                <button class="card-btn btn-dislike" onclick="this.classList.toggle('disliked')"><svg><use xlink:href="#icon-dislike"></use></svg></button>
                <button class="card-btn btn-heart" onclick="toggleLike(this, ${m.id})"><svg><use xlink:href="#icon-heart"></use></svg></button>
            `;
            grid.appendChild(card);
        });
    }

    function toggleLike(btn, id) {
        btn.classList.toggle('liked');
        if (btn.classList.contains('liked')) likedSet.add(id);
        else likedSet.delete(id);
        fetch(`${API_URL}/rate`, { method: 'POST', body: JSON.stringify({movie_id: id, action: 'like'}) });
    }

    function startApp() {
        document.getElementById('ready-btn').style.display = 'none';
        document.getElementById('nav').style.display = 'flex';
        document.querySelectorAll('.btn-dislike').forEach(b => b.style.display = 'flex');
        tg.HapticFeedback.impactOccurred('medium');
    }

    function showPage(id, el) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('page-active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('nav-active'));
        document.getElementById('page-' + id).classList.add('page-active');
        el.classList.add('nav-active');

        if (id === 'fav') {
            renderFavs();
        }
    }

    function renderFavs() {
        const favGrid = document.getElementById('page-fav');
        const emptyMsg = document.getElementById('fav-empty');
        favGrid.querySelectorAll('.movie-card').forEach(c => c.remove());

        const liked = moviesData.filter(m => likedSet.has(m.id));
        if (liked.length > 0) {
            emptyMsg.style.display = 'none';
            liked.forEach(m => {
                const card = document.createElement('div');
                card.className = 'movie-card';
                card.innerHTML = `<img src="${m.poster_url}"><div class="movie-info">${m.title}</div>`;
                favGrid.appendChild(card);
            });
        } else {
            emptyMsg.style.display = 'block';
        }
    }

    loadMovies();
    tg.expand();
</script>
</body>
</html>
