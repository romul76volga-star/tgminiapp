<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Movie Tinder</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            --bg-color: #1a1a1a;
            --text-color: #ffffff;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }
        .card {
            width: 90%;
            max-width: 350px;
            background: #2c2c2c;
            border-radius: 20px;
            padding: 15px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .card img {
            width: 100%;
            height: 400px;
            object-fit: cover;
            border-radius: 15px;
            background: #444;
        }
        .title { margin: 15px 0 5px; font-size: 20px; }
        .year { color: #888; margin-bottom: 20px; }
        .buttons { display: flex; gap: 30px; justify-content: center; padding-bottom: 10px; }
        button {
            border: none;
            background: #444;
            color: white;
            font-size: 40px;
            cursor: pointer;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.1s;
        }
        button:active { transform: scale(0.9); }
        .btn-like { background: #2ecc71; }
        .btn-dislike { background: #e74c3c; }
    </style>
</head>
<body>

    <div id="movie-card" class="card">
        <div id="loader">Загрузка фильмов...</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        // !!! ЗАМЕНИ ЭТУ ССЫЛКУ НА СВОЮ ИЗ NGROK КАЖДЫЙ РАЗ ПРИ ПЕРЕЗАПУСКЕ !!!
        const API_URL = "https://unrebuked-overinsistently-chasidy.ngrok-free.dev";

        let movies = [];
        let currentIndex = 0;

        async function loadMovies() {
            try {
                // headers нужны, чтобы пропустить белую страницу ngrok
                const response = await fetch(`${API_URL}/movies`, {
                    headers: { 'ngrok-skip-browser-warning': 'true' }
                });
                movies = await response.json();
                renderMovie();
            } catch (e) {
                document.getElementById('movie-card').innerHTML = "Ошибка: сервер не отвечает";
            }
        }

        function renderMovie() {
            const container = document.getElementById('movie-card');
            if (currentIndex >= movies.length) {
                container.innerHTML = "<h2>Фильмы закончились! 🎬</h2>";
                return;
            }

            const movie = movies[currentIndex];
            container.innerHTML = `
                <img src="${movie.poster_url || ''}" alt="Постер">
                <div class="title">${movie.title}</div>
                <div class="year">${movie.year}</div>
                <div class="buttons">
                    <button class="btn-dislike" onclick="sendAction(${movie.id}, 'dislike')">❌</button>
                    <button class="btn-like" onclick="sendAction(${movie.id}, 'like')">❤️</button>
                </div>
            `;
        }

        async function sendAction(movieId, action) {
            try {
                await fetch(`${API_URL}/rate`, {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'ngrok-skip-browser-warning': 'true' 
                    },
                    body: JSON.stringify({ movie_id: movieId, action: action })
                });
                currentIndex++;
                renderMovie();
            } catch (e) {
                console.error("Не удалось сохранить реакцию");
            }
        }

        loadMovies();
    </script>
</body>
</html>
