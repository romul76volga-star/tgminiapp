<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FilmsBot AI</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { margin: 0; background: #fff; font-family: sans-serif; padding-bottom: 100px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 10px; }
        .card { background: #f9f9f9; border-radius: 15px; overflow: hidden; position: relative; height: 260px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .card img { width: 100%; height: 100%; object-fit: cover; }
        .title { position: absolute; bottom: 0; width: 100%; background: rgba(0,0,0,0.7); color: #fff; font-size: 12px; padding: 8px; text-align: center; }
        .btn { position: absolute; top: 10px; width: 35px; height: 35px; border-radius: 50%; border: none; background: #fff; cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .btn-like { right: 10px; color: #ff3b30; }
        .btn-dislike { left: 10px; color: #333; }
        .active-like { background: #ff3b30 !important; color: #fff !important; }
    </style>
</head>
<body>
    <div id="movie-grid" class="grid"></div>

    <script>
        const tg = window.Telegram.WebApp;
        // !!! ЗАМЕНИ ЭТУ ССЫЛКУ ПОСЛЕ ПЕРЕЗАПУСКА NGROK !!!
        const API = "https://unrebuked-overinsistently-chasidy.ngrok-free.dev"; 

        let likes = new Set();
        let dislikes = new Set();

        async function loadMovies() {
            const isAI = likes.size > 0 || dislikes.size > 0;
            const url = isAI ? `${API}/recommend` : `${API}/movies`;
            
            try {
                const response = await fetch(url, {
                    method: isAI ? 'POST' : 'GET',
                    headers: { 'Content-Type': 'application/json', 'ngrok-skip-browser-warning': 'true' },
                    body: isAI ? JSON.stringify({ liked_movies: Array.from(likes), disliked_movies: Array.from(dislikes) }) : null
                });
                const data = await response.json();
                render(data);
            } catch (e) {
                document.getElementById('movie-grid').innerHTML = "<p style='padding:20px;'>Ошибка связи с сервером. Проверь ngrok и нажми 'Visit Site' в браузере.</p>";
            }
        }

        function render(movies) {
            const container = document.getElementById('movie-grid');
            container.innerHTML = '';
            movies.forEach(m => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <img src="${m.poster_url}" onerror="this.src='https://via.placeholder.com/200x300?text=No+Poster'">
                    <div class="title">${m.title}</div>
                    <button class="btn btn-dislike" onclick="press(${m.id}, 'dislike')">✕</button>
                    <button class="btn btn-like ${likes.has(m.id) ? 'active-like' : ''}" onclick="press(${m.id}, 'like')">❤</button>
                `;
                container.appendChild(card);
            });
        }

        async function press(id, type) {
            if (type === 'like') {
                if(likes.has(id)) likes.delete(id); else { likes.add(id); dislikes.delete(id); }
            } else {
                if(dislikes.has(id)) dislikes.delete(id); else { dislikes.add(id); likes.delete(id); }
            }
            
            // Сохраняем в БД (тихо)
            fetch(`${API}/rate`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ movie_id: id, action: type })
            });

            tg.HapticFeedback.impactOccurred('medium');
            loadMovies();
        }

        loadMovies();
        tg.expand();
    </script>
</body>
</html>
