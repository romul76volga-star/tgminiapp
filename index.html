<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FilmsBot</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* Общие стили в стиле твоего макета */
        body {
            margin: 0; padding: 0;
            background-color: #1a1a1a; /* Темный фон вокруг */
            font-family: -apple-system, sans-serif;
            display: flex; flex-direction: column; align-items: center;
            height: 100vh; overflow: hidden;
        }

        /* Белое полотно приложения */
        .app-container {
            background: white;
            width: 90%; max-width: 400px;
            height: 85vh; margin-top: 20px;
            border-radius: 30px;
            display: flex; flex-direction: column;
            position: relative; overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }

        /* Поиск */
        .search-container { padding: 15px; }
        .search-box {
            background: #f0f0f0; border-radius: 12px;
            padding: 10px; color: #999;
            display: flex; align-items: center; font-size: 14px;
        }

        /* Сетка фильмов */
        .content {
            flex: 1; overflow-y: auto;
            padding: 0 15px 80px 15px;
            display: grid; grid-template-columns: 1fr 1fr; gap: 15px;
        }

        .movie-card {
            background: #fff; border-radius: 15px;
            display: flex; flex-direction: column;
            position: relative;
        }

        .movie-card img {
            width: 100%; height: 180px;
            object-fit: cover; border-radius: 15px;
            background: #eee;
        }

        .movie-title {
            padding: 8px 0; font-size: 14px;
            text-align: center; color: #333;
        }

        /* Иконки */
        .icon {
            position: absolute; top: 10px;
            width: 24px; height: 24px;
            cursor: pointer; transition: 0.2s;
        }
        .icon-heart { right: 10px; color: #ccc; }
        .icon-fav { right: 40px; color: #ccc; display: none; } /* Скрыто на 1 экране */
        .active-heart { color: #ff4757 !important; }
        .active-fav { color: #ffa502 !important; }

        /* Нижняя панель */
        .nav-bar {
            position: absolute; bottom: 0; width: 100%;
            height: 60px; background: #f8f8f8;
            display: none; /* Скрыто на 1 экране */
            justify-content: space-around; align-items: center;
            border-top: 1px solid #eee;
        }

        .ready-btn {
            position: absolute; bottom: 20px; left: 50%;
            transform: translateX(-50%);
            padding: 12px 30px; background: #333;
            color: white; border: none; border-radius: 20px;
            font-weight: bold; cursor: pointer; z-index: 10;
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="search-container">
        <div class="search-box">🔍 поиск</div>
    </div>

    <div id="movie-grid" class="content">
        </div>

    <button id="ready-btn" class="ready-btn" onclick="goToMain()">Я готов!</button>

    <div id="nav-bar" class="nav-bar">
        <span>🏠</span>
        <span>🔖</span>
        <span>👤</span>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    // ССЫЛКА НА ТВОЙ NGROK
    const API_URL = "https://unrebuked-overinsistently-chasidy.ngrok-free.dev"; 

    async function loadMovies() {
        try {
            const response = await fetch(`${API_URL}/movies`, {
                headers: { 'ngrok-skip-browser-warning': 'true' }
            });
            const movies = await response.json();
            const grid = document.getElementById('movie-grid');
            
            movies.forEach(movie => {
                const card = document.createElement('div');
                card.className = 'movie-card';
                card.innerHTML = `
                    <img src="${movie.poster_url}">
                    <div class="movie-title">${movie.title}</div>
                    <div class="icon icon-heart" onclick="toggleLike(this)">❤</div>
                    <div class="icon icon-fav" onclick="toggleFav(this)">🔖</div>
                `;
                grid.appendChild(card);
            });
        } catch (e) { console.error("Ошибка загрузки"); }
    }

    function toggleLike(el) { el.classList.toggle('active-heart'); }
    function toggleFav(el) { el.classList.toggle('active-fav'); }

    function goToMain() {
        // Скрываем кнопку, показываем навигацию и вторую иконку
        document.getElementById('ready-btn').style.display = 'none';
        document.getElementById('nav-bar').style.display = 'flex';
        
        const favIcons = document.querySelectorAll('.icon-fav');
        favIcons.forEach(icon => icon.style.display = 'block');
    }

    loadMovies();
</script>

</body>
</html>
