<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Movie AI</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { margin: 0; background: #fff; font-family: sans-serif; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 10px; }
        .card { position: relative; border-radius: 15px; overflow: hidden; background: #f0f0f0; height: 250px; }
        .card img { width: 100%; height: 100%; object-fit: cover; }
        .title { position: absolute; bottom: 0; width: 100%; background: rgba(0,0,0,0.6); color: #fff; font-size: 12px; padding: 5px; text-align: center; }
        .btn { position: absolute; top: 10px; padding: 5px; border: none; border-radius: 50%; width: 30px; height: 30px; cursor: pointer; }
        .btn-like { right: 10px; background: #fff; }
        .btn-dislike { left: 10px; background: #fff; }
        .is-liked { background: #ff3b30; color: white; }
    </style>
</head>
<body>
    <div id="app" class="grid"></div>

    <script>
        const tg = window.Telegram.WebApp;
        // ЗАМЕНИ НА СВОЙ NGROK
        const API = "https://unrebuked-overinsistently-chasidy.ngrok-free.dev";

        let likes = new Set();
        let dislikes = new Set();

        async function load() {
            const isAI = likes.size > 0 || dislikes.size > 0;
            const url = isAI ? `${API}/recommend` : `${API}/movies`;
            
            try {
                const response = await fetch(url, {
                    method: isAI ? 'POST' : 'GET',
                    headers: { 'Content-Type': 'application/json', 'ngrok-skip-browser-warning': 'true' },
                    body: isAI ? JSON.stringify({ liked_movies: Array.from(likes), disliked_movies: Array.from(dislikes) }) : null
                });
                const movies = await response.json();
                render(movies);
            } catch (e) {
                console.error(e);
                document.getElementById('app').innerText = "Ошибка сервера. Проверь ngrok.";
            }
        }

        function render(movies) {
            const box = document.getElementById('app');
            box.innerHTML = '';
            movies.forEach(m => {
                const div = document.createElement('div');
                div.className = 'card';
                div.innerHTML = `
                    <img src="${m.poster_url}">
                    <div class="title">${m.title}</div>
                    <button class="btn btn-dislike" onclick="action(${m.id}, 'dislike')">✖</button>
                    <button class="btn btn-like ${likes.has(m.id) ? 'is-liked' : ''}" onclick="action(${m.id}, 'like')">❤</button>
                `;
                box.appendChild(div);
            });
        }

        async function action(id, type) {
            if (type === 'like') {
                likes.add(id); dislikes.delete(id);
            } else {
                dislikes.add(id); likes.delete(id);
            }
            
            // Отправляем на сервер
            fetch(`${API}/rate`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ movie_id: id, action: type })
            });

            tg.HapticFeedback.impactOccurred('light');
            load(); // Обновляем список
        }

        load();
        tg.expand();
    </script>
</body>
</html>
